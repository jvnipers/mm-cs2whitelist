// Core Configuration File for CS2 Whitelist (Metamod Plugin)
// Place this file at: <game_root>/cfg/cs2whitelist/core.cfg

"cs2whitelist"
{
    "Config"
    {
        // Enable the server whitelist. Set to "0" to let everyone connect.
        "Enable"        "1"

        // Skip the whitelist check for players with any cs2admin flag
        // (requires mm-cs2admin to be loaded alongside this plugin).
        "Immunity"      "1"

        // Message printed to the player's console when they are kicked.
        "KickMessage"   "You are not whitelisted on this server."

        // Whitelist file name, relative to <game>/cfg/cs2whitelist/.
        "Filename"      "whitelist.txt"

        // Log failed join attempts.
        // 0 = off
        // 1 = always (console + <game>/addons/cs2whitelist/logs/YYYY-MM-DD.log)
        // 2 = once per player per map (first rejection only)
        "Log"           "0"
    }

    // Optional SQL database for persistent whitelist storage.
    // When enabled, entries are loaded from the DB on plugin load and every
    // map change. wl_add / wl_remove also write to the database.
    // Requires the sql_mm Metamod plugin to be loaded.
    "Database"
    {
        // Set to "1" to enable database persistence.
        "Enabled"   "0"

        // "sqlite" or "mysql"
        "Type"      "sqlite"

        // SQLite: path to .db file (relative to game root)
        "Path"      "addons/cs2whitelist/whitelist.db"

        // Table prefix  ->  table name: <prefix>_whitelist
        "Prefix"    "cs2wl"

        // MySQL settings (only used when Type is "mysql")
        "Host"      "localhost"
        "User"      "root"
        "Pass"      ""
        "Database"  "cs2whitelist"
        "Port"      "3306"
    }
}
